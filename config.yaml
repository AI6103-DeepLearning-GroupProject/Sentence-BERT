slurm:
  train:
    config_path: examples/config.yaml  # Training config file path; usually examples/config.yaml where experiments.* are defined.
    experiment: runtime  # runtime | nli_bert | sts_bert | sts_continue_training_bert | wikipedia_triplet_bert; as of examples/config.yaml -> experiments.<name>
    model_variant: sbert_base  # iff experiment=runtime; options: sbert_base | sbert_large | sroberta_base | sroberta_large; -> experiments.runtime.runtime.model_variants.<name>
    data_mode: nli_mnrl  # iff experiment=runtime; options: sts | nli | nli_mnrl | sts_nli(or sts+nli) | sts_nli_mnrl(or sts+nli+mnrl) | wikipedia_triplet | wikipedia_triplet_mnrl; -> examples/config.yaml: experiments.runtime.runtime.data_modes.<name>
    epochs: 1  # Used only when experiment=runtime to override stage default epochs (applies to stages without stage.training.num_epochs).
    seed: 42  # Training random seed (passed to train_with_config.py --seed).
    num_runs: 1  # Number of train+eval cycles in scripts/02_train_sbert.slurm (different seeds across runs).
    seed_step: 1  # Seed increment between training runs; run_i seed = seed + (i-1)*seed_step.
    resume_stage: 1  # 1-based runtime stage index to start from in the first run; use >1 to skip earlier stages.
    resume_from: ""  # Optional model path to load when resume_stage > 1; empty means using result_dir/model.
    result_dir: "result/runtime_sbert_base_nli_mnrl/"  # Optional fixed result folder for combined train+eval artifacts; empty means auto path under result/.
    data_auto_download: 1  # Options: 0/1; 1 means auto-run examples/datasets/get_data.py when required files are missing.

  eval:
    task_type: senteval  # sts | triplet | senteval | auto; auto picks triplet for wikipedia_* modes and sts otherwise.
    model_name: bert-base-nli-mean-tokens  # HF model id or local model directory, e.g. bert-base-nli-mean-tokens or output/.../model.
    sts_path: datasets/stsbenchmark  # STSBenchmark dataset directory.
    sts_test_file: sts-test.csv  # Test file name under sts_path.
    triplet_path: datasets/wikipedia-sections-triplets  # Triplet dataset directory for wikipedia evaluations.
    triplet_test_file: test.csv  # Triplet test file name under triplet_path.
    triplet_s1_col_idx: 1  # Anchor column index in triplet CSV.
    triplet_s2_col_idx: 2  # Positive column index in triplet CSV.
    triplet_s3_col_idx: 3  # Negative column index in triplet CSV.
    triplet_delimiter: ","  # Triplet CSV delimiter.
    triplet_quoting: QUOTE_MINIMAL  # Triplet CSV quoting mode in Python csv module naming.
    triplet_has_header: 1  # 1 if triplet CSV has header, else 0.
    batch_size: 64  # Evaluation batch size.
    seed: 42  # Start seed for multi-run evaluation.
    num_runs: 1  # Number of evaluation runs with different seeds (e.g. 10 runs for mean/std aggregation).
    seed_step: 1  # Seed increment per run; seed_i = seed + (i-1)*seed_step.
    main_similarity: cosine  # Options: cosine | euclidean | manhattan | dot | max (max lets evaluator choose the best metric).
    main_distance: cosine  # Triplet main score distance: cosine | euclidean | manhattan | max.
    senteval_toolkit_path: datasets/SentEval  # SentEval toolkit root (should contain senteval/ package).
    senteval_data_path: datasets/SentEval/data  # SentEval transfer-task data root.
    senteval_tasks: MR,CR,SUBJ,MPQA,SST2,TREC,MRPC  # Comma-separated SentEval tasks.
    senteval_kfold: 2  # SentEval kfold; must be >=2 for CV tasks. set 10 to reproduce classic behavior.
    senteval_main_metric: auto  # Metric key in evaluate_senteval.py summary, or auto to average primary task metrics.
    senteval_classifier_nhid: 0  # SentEval classifier hidden units.
    senteval_classifier_optim: rmsprop  # SentEval classifier optimizer.
    senteval_classifier_batch_size: 128  # SentEval classifier batch size.
    senteval_classifier_tenacity: 3  # SentEval classifier tenacity.
    senteval_classifier_epoch_size: 2  # SentEval classifier epoch size.
    data_auto_download: 1  # Options: 0/1; 1 means auto-download STS files when missing.
